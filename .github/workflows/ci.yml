name: CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: "Contracts: forge test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source $HOME/.bashrc || true
          foundryup || true

      - name: Run `forge build`
        run: |
          forge build --no-ansi

      - name: Run `forge test`
        run: |
          forge test --no-ansi

  coverage:
    name: "Contracts: forge coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source $HOME/.bashrc || true
          foundryup || true

      - name: Run `forge coverage`
        run: |
          forge coverage --no-ansi --report summary

      - name: Generate coverage report
        run: |
          forge coverage --no-ansi --report lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

  slither:
    name: "Contracts: Slither analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source $HOME/.bashrc || true
          foundryup || true

      - name: Install Slither
        run: |
          pip3 install slither-analyzer

      - name: Run Slither
        run: |
          slither src/ --ignore-compile --config-file slither.config.json || true
        continue-on-error: true

  frontend:
    name: "Frontend: build & typecheck"
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Typecheck
        run: |
          cd frontend
          npm run check

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  subgraph:
    name: "Subgraph: codegen & build"
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install subgraph deps & graph-cli
        run: |
          cd subgraph
          npm ci
          npm install -g @graphprotocol/graph-cli

      - name: Run `graph codegen`
        run: |
          cd subgraph
          npm run codegen

      - name: Run `graph build`
        run: |
          cd subgraph
          npm run build
