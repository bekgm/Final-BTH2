name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: Contracts: forge test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source $HOME/.bashrc || true
          foundryup || true

      - name: Run `forge test`
        run: |
          forge test --no-ansi

  frontend:
    name: Frontend: build & typecheck
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Typecheck
        run: |
          cd frontend
          npm run check

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  subgraph:
    name: Subgraph: codegen & build
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install subgraph deps & graph-cli
        run: |
          cd subgraph
          npm ci
          npm install -g @graphprotocol/graph-cli

      - name: Run `graph codegen`
        run: |
          cd subgraph
          npm run codegen

      - name: Run `graph build`
        run: |
          cd subgraph
          npm run build
