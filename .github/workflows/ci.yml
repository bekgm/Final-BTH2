%YAML 1.2
---
name: CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: "Contracts: forge test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run `forge build`
        run: forge build

      - name: Run `forge test`
        run: forge test

  coverage:
    name: "Contracts: forge coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run `forge coverage`
        run: forge coverage --report summary --via-ir

      - name: Generate coverage report
        run: forge coverage --report lcov --via-ir

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

  slither:
    name: "Contracts: Slither analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: |
          pip3 install slither-analyzer

      - name: Run Slither
        run: |
          slither src/ --ignore-compile --config-file slither.config.json || true
        continue-on-error: true

  frontend:
    name: "Frontend: build & typecheck"
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Typecheck
        run: |
          cd frontend
          npm run check

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  subgraph:
    name: "Subgraph: codegen & build"
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install subgraph deps & graph-cli
        run: |
          cd subgraph
          npm ci
          npm install -g @graphprotocol/graph-cli

      - name: Run `graph codegen`
        run: |
          cd subgraph
          npm run codegen

      - name: Run `graph build`
        run: |
          cd subgraph
          npm run build
